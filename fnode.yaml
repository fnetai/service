name: service

ai::name: "@fnet/service"

s::repo.url: https://github.com/fnetai/service.git

# input: g::file://./fnet/input.yaml

features:
  dts: false
  cli: false
  app: false
  t::dev::cli: true
  s::runtime.type: bun

commands:

  # --- Test Commands ---

  prepare-simple-server:
    wdir: tests/simple-server
    steps:
      - fnode build
      - fnode cli:compile
      - fork: ./.workspace/.bin/simple-server --cli-mode http --cli-port 3000
      - sleep: 3
      - "curl http://localhost:3000/input -X POST -H \"Content-Type: application/json\" -d '{\"message\": \"Hello, World!\"}' -o /dev/stdout"
      - exit: 0

  test-validation:
    description: Test input validation (missing name, invalid action)
    usage: frun test-validation
    steps:
      - fnode cli:dev --config validation-missing-name
      - fnode cli:dev --config validation-invalid-action

  test-register:
    description: Register a test service (autoStart off)
    usage: sudo -S frun test-register
    steps:
      - fnode cli:dev --config register

  test-register-autostart:
    description: Register a test service (autoStart on)
    usage: sudo -S frun test-register-autostart
    steps:
      - fnode cli:dev --config register-autostart

  test-status:
    description: Check test service status
    usage: frun test-status
    steps:
      - fnode cli:dev --config status

  test-start:
    description: Start the test service
    usage: sudo -S frun test-start
    steps:
      - fnode cli:dev --config start

  test-stop:
    description: Stop the test service
    usage: sudo -S frun test-stop
    steps:
      - fnode cli:dev --config stop

  test-health:
    description: Check test service health
    usage: frun test-health
    steps:
      - fnode cli:dev --config health

  test-inspect:
    description: Inspect test service configuration
    usage: frun test-inspect
    steps:
      - fnode cli:dev --config inspect

  test-logs:
    description: Get test service logs
    usage: frun test-logs
    steps:
      - fnode cli:dev --config logs

  test-unregister:
    description: Unregister the test service
    usage: sudo -S frun test-unregister
    steps:
      - fnode cli:dev --config unregister

  test-all:
    description: Run full test lifecycle
    usage: sudo -S frun test-all
    steps:
      # Manual start lifecycle
      - frun test-status
      - frun test-register
      - frun test-status
      - frun test-start
      - frun test-health
      - frun test-inspect
      - frun test-logs
      - frun test-stop
      - frun test-status
      - frun test-unregister
      # AutoStart lifecycle
      - frun test-register-autostart
      - frun test-status
      - frun test-health
      - frun test-stop
      - frun test-unregister
