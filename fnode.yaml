name: service

ai::name: "@fnet/service"

s::repo.url: https://gitlab.com/fnetai/service.git

input: g::file://./fnet/input.yaml

features:
  dts: true
  app: false
  cli: false
  # t::dev::s::cli.fargs.default: dev

commands:
  register:
    usage: sudo -S frun register
    steps:
      - fnode cli --action="{{action}}" --name="{{name}}" --user="{{user}}" --description="{{description}}" --command="/Users/gboyraz/.fnet/bin/find-free-port" --command="--cli-mode" --command="mcp" --command="--mcp-transport" --command="sse"

    context:
      action: register
      name: ai.flownet.find-free-port
      description: Find free port
      user: gboyraz

  unregister:
    usage: sudo -S frun unregister
    steps:
      - fnode cli --action="{{action}}" --name="{{name}}"

    context:
      action: unregister
      name: ai.flownet.find-free-port

  enable:
    usage: sudo -S frun enable
    steps:
      - fnode cli --action="{{action}}" --name="{{name}}"

    context:
      action: enable
      name: ai.flownet.find-free-port

  status:
    usage: sudo -S frun status
    steps:
      - fnode cli --action="{{action}}" --name="{{name}}"
    context:
      action: status
      name: ai.flownet.find-free-port

  start:
    usage: sudo -S frun start
    steps:
      - fnode cli --action="{{action}}" --name="{{name}}"
    context:
      action: start
      name: ai.flownet.find-free-port

  stop:
    usage: sudo -S frun stop
    steps:
      - fnode cli --action="{{action}}" --name="{{name}}"
    context:
      action: stop
      name: ai.flownet.find-free-port

  health:
    usage: sudo -S frun health
    steps:
      - fnode cli --action="{{action}}" --name="{{name}}"
    context:
      action: health
      name: ai.flownet.find-free-port

  inspect:
    usage: sudo -S frun inspect
    steps:
      - fnode cli --action="{{action}}" --name="{{name}}"
    context:
      action: inspect
      name: ai.flownet.find-free-port
