name: service

ai::name: "@fnet/service"

s::repo.url: https://gitlab.com/fnetai/service.git

# input: g::file://./fnet/input.yaml

features:
  dts: false
  cli: false
  app: false
  s::runtime.type: bun
      
commands:
  register:
    usage: sudo -S frun register
    steps:
      - fnode cli:dev \
          --action="{{action}}" \
          --name="{{name}}" \
          --user="{{user}}" \
          --description="{{description}}" \
          --command="/Users/gboyraz/Desktop/flownet/fnet/service/.tests/node-1/.workspace/.bin/node-1" \
          --command="--cli-mode" \
          --command="http" \
          --command="--cli-port" \
          --command="3000"
          
    context:
      action: register
      name: ai.flownet.node-1-service
      description: Some sample flow node service for testing
      user: gboyraz

  unregister:
    usage: sudo -S frun unregister
    steps:
      - fnode cli:dev --action "{{action}}" --name "{{name}}"
    context:
      action: unregister
      name: ai.flownet.node-1-service

  enable:
    usage: sudo -S frun enable
    steps:
      - fnode cli:dev --action "{{action}}" --name "{{name}}"
    context:
      action: enable
      name: ai.flownet.node-1-service

  status:
    usage: sudo -S frun status
    steps:
      - fnode cli:dev --action "{{action}}" --name "{{name}}"
    context:
      action: status
      name: ai.flownet.node-1-service

  start:
    usage: sudo -S frun start
    steps:
      - fnode cli:dev --action "{{action}}" --name "{{name}}"
    context:
      action: start
      name: ai.flownet.node-1-service

  stop:
    usage: sudo -S frun stop
    steps:
      - fnode cli:dev --action "{{action}}" --name "{{name}}"
    context:
      action: stop
      name: ai.flownet.node-1-service

  health:
    usage: sudo -S frun health
    steps:
      - fnode cli:dev --action "{{action}}" --name "{{name}}"
    context:
      action: health
      name: ai.flownet.node-1-service

  inspect:
    usage: sudo -S frun inspect
    steps:
      - fnode cli:dev --action "{{action}}" --name "{{name}}"
    context:
      action: inspect
      name: ai.flownet.node-1-service
