$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
properties:
  action:
    type: string
    description: "The action to be performed on the service (register, unregister, start, stop)"
    enum: ["register", "unregister", "start", "stop"]
  name:
    type: string
    description: "The name of the service"
  description:
    type: string
    description: "A brief description of the service"
  command:
    type: string
    description: "The command that starts the service"
  user:
    type: string
    description: "User under which the service should run"
  env:
    type: object
    description: "Environment variables for the service"
    additionalProperties:
      type: string
required:
  - action
  - name
if:
  properties:
    action:
      const: "register"
then:
  required:
    - description
    - command