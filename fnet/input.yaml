$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
properties:
  action:
    type: string
    description: "The operation to perform on the service"
    enum: ["register", "unregister", "start", "stop", "enable", "status", "health", "inspect"]
  name:
    type: string
    description: "Service identifier"
  description:
    type: string
    description: "Service description (required for registration)"
  command:
    type: array
    description: "Command array to execute (required for registration)"
    items:
      type: string
  user:
    type: string
    description: "User account to run the service"
  env:
    type: object
    description: "Environment variables for the service"
    additionalProperties:
      type: string
  working_dir:
    type: string
    description: "Working directory for the service"
  autoStart:
    type: boolean
    description: "Whether to start the service automatically on registration or system startup"
    default: false
  restartOnFailure:
    type: boolean
    description: "Whether to restart the service automatically if it fails or stops"
    default: false
required:
  - action
  - name
if:
  properties:
    action:
      const: "register"
then:
  required:
    - description
    - command
